version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - nilerr
    - bodyclose
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam

issues:
  max-same-issues: 0
